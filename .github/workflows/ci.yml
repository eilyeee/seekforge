name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint (biome)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome (lint + format check)
        run: pnpm lint

  node:
    name: node 22 / ${{ matrix.os }} (typecheck / test / build)
    strategy:
      fail-fast: false
      matrix:
        # macOS catches darwin-only breakage (paths, seatbelt sandbox, spawn
        # semantics) before release time — the CLI ships to npm and the
        # desktop app targets macOS, but releases were the first place any
        # non-Linux failure could surface.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The sandbox enforcement tests need bwrap; Ubuntu 24.04 additionally
      # restricts unprivileged user namespaces via AppArmor, which would make
      # bwrap fail even when installed. (macOS ships sandbox-exec natively.)
      - name: Install bubblewrap for sandbox enforcement tests
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bubblewrap
          sudo sysctl -q kernel.apparmor_restrict_unprivileged_userns=0

      # Build the runtime so the TS<->Rust integration test (backend-integration
      # .test.ts) actually runs instead of skipping. Linux only to keep the
      # macOS matrix lean; the sentinel below makes a missing binary fail there.
      - name: Setup Rust toolchain (runtime integration test)
        if: runner.os == 'Linux'
        uses: dtolnay/rust-toolchain@stable

      - name: Build seekforge-runtime (TS<->Rust integration test)
        if: runner.os == 'Linux'
        run: cargo build --release -p seekforge-runtime

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test
        env:
          # Fail loudly if the sandbox mechanism is missing instead of letting
          # the enforcement tests skip silently (os-sandbox.test.ts sentinel).
          SEEKFORGE_REQUIRE_SANDBOX_TESTS: "1"
          # On Linux the runtime was built above, so the TS<->Rust integration
          # test must run (not skip). macOS has no binary and leaves it empty.
          SEEKFORGE_REQUIRE_RUNTIME_TESTS: ${{ runner.os == 'Linux' && '1' || '' }}

      - name: Critical boundary coverage
        run: pnpm test:coverage:critical

      # Permission gating, OS sandbox, the agent loop, and the WS protocol are
      # the enforcement surfaces of a local-first agent — a regression that
      # guts their tests must fail the build, not just lower a number nobody
      # reads. Thresholds sit slightly below current measured coverage.
      - name: Security boundary coverage
        run: pnpm test:coverage:security

      - name: WS protocol coverage
        run: pnpm test:coverage:ws

      # Run-ledger (JSONL torn-write repair, compaction retention, seq recovery)
      # and triggers (HMAC/constant-time auth, injection sanitization) are
      # enforcement surfaces too — gate them so gutting their tests fails CI.
      - name: Server enforcement coverage
        run: pnpm test:coverage:server

      - name: Upload CLI build
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: apps/cli/dist/
          if-no-files-found: error
          retention-days: 1

  node-20-package:
    name: node 20 (published CLI smoke)
    needs: node
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download CLI build
        uses: actions/download-artifact@v4
        with:
          name: cli-dist
          path: apps/cli/dist

      - name: Pack, install, and run published commands
        run: node scripts/npm-pack-smoke.mjs

  rust:
    name: rust (check / test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      # The desktop (seekforge-desktop / src-tauri) crate is excluded: its
      # tauri::generate_context! macro requires a built frontend (apps/desktop/dist),
      # which is produced by the node build, not available in this job. The desktop
      # bundle is owned by a separate release workflow.
      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo check
        run: cargo check --workspace --exclude seekforge-desktop

      - name: Cargo clippy
        run: cargo clippy --workspace --exclude seekforge-desktop --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --workspace --exclude seekforge-desktop

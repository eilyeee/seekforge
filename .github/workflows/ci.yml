name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  node:
    name: node 22 (typecheck / test / build)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test

      - name: Critical boundary coverage
        run: pnpm test:coverage:critical

      - name: Upload CLI build
        uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: apps/cli/dist/
          if-no-files-found: error
          retention-days: 1

  node-20-package:
    name: node 20 (published CLI smoke)
    needs: node
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download CLI build
        uses: actions/download-artifact@v4
        with:
          name: cli-dist
          path: apps/cli/dist

      - name: Pack, install, and run published commands
        run: node scripts/npm-pack-smoke.mjs

  rust:
    name: rust (check / test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      # The desktop (seekforge-desktop / src-tauri) crate is excluded: its
      # tauri::generate_context! macro requires a built frontend (apps/desktop/dist),
      # which is produced by the node build, not available in this job. The desktop
      # bundle is owned by a separate release workflow.
      - name: Cargo check
        run: cargo check --workspace --exclude seekforge-desktop

      - name: Cargo test
        run: cargo test --workspace --exclude seekforge-desktop

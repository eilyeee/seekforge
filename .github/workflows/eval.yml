name: Eval (regression gate)

# Evals call the real provider API (cost + non-determinism), so this is not a PR
# gate. The weekly nightly suite samples every task three times and enforces the
# configured quality, cost, token, tool-failure, and session-error thresholds.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  eval:
    name: eval vs baseline
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.16.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Restore previous eval trend history
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          previous=$(gh run list --workflow eval.yml --status success --limit 1 --json databaseId --jq '.[0].databaseId // empty')
          if [[ -z "$previous" ]]; then
            echo "No previous successful eval run; starting a new trend history."
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/eval-history" evals/reports
          if gh run download "$previous" --name "eval-trends-$previous" --dir "$RUNNER_TEMP/eval-history"; then
            history=$(find "$RUNNER_TEMP/eval-history" -name trends.json -type f -print -quit)
            if [[ -n "$history" ]]; then
              cp "$history" "evals/reports/history-$previous.json"
            fi
          else
            echo "Previous trend artifact is unavailable; continuing with current reports."
          fi
      - name: Mark eval start
        run: touch "$RUNNER_TEMP/eval-start"
      - name: Run evals against the baseline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: >-
          pnpm --filter @seekforge/eval-harness eval --
          --suite nightly
          --repeat 3
          --baseline evals/baseline.json
          --fail-on-regression
          --require-api-key
          --junit evals/reports/junit.xml
      - name: Publish eval summary
        if: always()
        shell: bash
        run: |
          report=$(find evals/reports -maxdepth 1 -name '*.md' ! -name 'trends.md' -type f -newer "$RUNNER_TEMP/eval-start" -print | sort | tail -n 1)
          if [[ -n "$report" ]]; then
            cat "$report" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No eval report was generated." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [[ -f evals/reports/trends.md ]]; then
            printf '\n\n' >> "$GITHUB_STEP_SUMMARY"
            cat evals/reports/trends.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-${{ github.run_id }}
          path: evals/reports/
          if-no-files-found: ignore
          retention-days: 30
      - name: Upload eval trends
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-trends-${{ github.run_id }}
          path: |
            evals/reports/trends.json
            evals/reports/trends.md
          if-no-files-found: ignore
          retention-days: 90

name: Integration (runtime environments)

on:
  workflow_dispatch:
  schedule:
    - cron: "30 5 * * 1"

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust-runtime:
    name: Rust runtime binary
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master 2026-07-16
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build and exercise the real stdio runtime
        run: cargo test -p seekforge-runtime --test protocol

  docker:
    name: Docker runner image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Confirm Docker daemon
        run: docker info
      - name: Build runner image
        run: docker build --tag seekforge-runner:integration .
      - name: Start the packaged CLI in Docker
        run: docker run --rm seekforge-runner:integration --help

  playwright:
    name: Playwright Chromium
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@0609f0983b7a228f052f81ef4c3d6510cae254ad # v4
        with:
          version: 10.16.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
      - name: Install Chromium
        run: pnpm dlx playwright@1.55.0 install --with-deps chromium
      - name: Exercise a real headless browser
        run: node scripts/playwright-smoke.mjs

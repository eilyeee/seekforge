name: release-desktop

# Builds and publishes the SeekForge desktop app (a macOS DMG) to a GitHub
# Release whenever a `v*` tag is pushed.
#
# NOTE: the auto-updater is OPT-IN and OFF by default. With the shipped config
# (`bundle.createUpdaterArtifacts: false` + a placeholder `plugins.updater.pubkey`)
# this workflow produces a working DMG but NO updater payload / `latest.json`,
# so installs won't self-update. To ship auto-updatable releases, first do
# RELEASING.md step 0 (generate the keypair, set createUpdaterArtifacts: true,
# paste the real pubkey, add the TAURI_SIGNING_* secrets); only then do the
# updater-payload + latest.json steps below actually run.
#
# What this does, end to end:
#   1. On a `v*` tag (or manual dispatch) it runs a macOS matrix
#      (Apple Silicon + Intel).
#   2. Each job verifies the tag matches the version in
#      `apps/desktop/src-tauri/tauri.conf.json`, builds the Tauri bundle,
#      (when the updater is enabled) signs the updater payload with the Tauri
#      signing key, optionally code-signs + notarizes with an Apple Developer ID,
#      and uploads the DMG (+ .app.tar.gz / .sig when present) to the release.
#   3. When the updater is enabled, tauri-action also generates `latest.json`
#      (the updater manifest). Because both matrix jobs target the same
#      `tagName`, tauri-action APPENDS each arch's entry to the SAME
#      `latest.json` — so the published manifest ends up with both
#      `darwin-aarch64` and `darwin-x86_64` keys.
#
# Coordination with the npm release workflow:
#   The npm release workflow (.github/workflows/release-npm.yml, owned by a
#   different change) also creates a GitHub Release for the same `v*` tag.
#   tauri-action is idempotent against an existing release: if the release for
#   the tag already exists it reuses it and just appends the desktop assets, and
#   if it does not exist yet it creates it. Either ordering works — both
#   workflows target one shared release per tag.
#
# Required repo secrets (see apps/desktop/docs/RELEASING.md for generation):
#   TAURI_SIGNING_PRIVATE_KEY           (required for working auto-update)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  (required; "" if you set no password)
# Optional Apple code-signing / notarization secrets (all must be present
# together to enable signing; absent => an UNSIGNED build is produced instead of
# failing, so forks without secrets still build):
#   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
#   APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID, KEYCHAIN_PASSWORD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build (for example v0.7.0)."
        required: true
        type: string

# Serialize runs per ref: two rapid tag pushes/dispatches would otherwise run
# overlapping macOS matrix builds racing to append assets to the same GitHub
# Release. Never cancel a release mid-flight — queue instead.
concurrency:
  group: release-desktop-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14   # Apple Silicon
            target: aarch64-apple-darwin
          - platform: macos-13   # Intel
            target: x86_64-apple-darwin
          # --- Deferred platforms (uncomment + add per-OS deps to enable) ---
          # - platform: ubuntu-22.04
          #   target: x86_64-unknown-linux-gnu
          # - platform: windows-latest
          #   target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Resolve and checkout release tag
        id: release
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="$DISPATCH_TAG"
          else
            TAG="$GITHUB_REF_NAME"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid release tag '$TAG'."
            exit 1
          fi
          TAG_COMMIT="$(git rev-parse --verify "refs/tags/${TAG}^{commit}")" || {
            echo "::error::Release tag '$TAG' does not exist."
            exit 1
          }
          git checkout --detach "$TAG_COMMIT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@0609f0983b7a228f052f81ef4c3d6510cae254ad # v4
        with:
          version: 10.16.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master 2026-07-16
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Keep arch-specific caches separate so the two matrix jobs don't clash.
          key: ${{ matrix.target }}
          workspaces: . -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail fast if someone tags a version that doesn't match tauri.conf.json.
      # Skipped on workflow_dispatch (no tag ref to compare against).
      - name: Verify tag matches tauri.conf.json version
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          tag="$RELEASE_VERSION"
          conf="$(node -p "require('./apps/desktop/src-tauri/tauri.conf.json').version")"
          echo "Tag version:        $tag"
          echo "tauri.conf version: $conf"
          if [ "$tag" != "$conf" ]; then
            echo "::error::Tag v$tag does not match tauri.conf.json version $conf. Bump apps/desktop/src-tauri/tauri.conf.json (and src-tauri/Cargo.toml) before tagging."
            exit 1
          fi

      # Import the Apple Developer ID cert into a temporary keychain — only when
      # the signing secrets are present. Skipped on forks/PRs without secrets so
      # the build still produces an (unsigned) DMG instead of failing.
      - name: Import Apple Developer certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-$APPLE_CERTIFICATE_PASSWORD}"
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain
          rm -f certificate.p12

      # The desktop bundle embeds the CLI as a self-contained sidecar (so a
      # DMG-only user needs no system `seekforge`). It must exist BEFORE the
      # Tauri build, since tauri.conf.json references it via `externalBin`. Built
      # for THIS matrix arch (host == matrix.target on the native macOS runners).
      - name: Setup bun (for the CLI sidecar)
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Build the CLI sidecar (externalBin)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p apps/desktop/src-tauri/binaries
          bun build --compile apps/cli/src/index.ts \
            --outfile "apps/desktop/src-tauri/binaries/seekforge-server-${{ matrix.target }}"
          test -f "apps/desktop/src-tauri/binaries/seekforge-server-${{ matrix.target }}"

      - name: Build, sign, and publish desktop release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater payload signing (always set; required for auto-update).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple code-signing / notarization. When these are empty (no secrets)
          # tauri-action produces an unsigned build instead of failing.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # Build from repo root: the src-tauri crate is a member of the root
          # Cargo workspace and the Tauri CLI is a root devDependency.
          projectPath: .
          tauriScript: pnpm tauri
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: 'SeekForge v__VERSION__'
          releaseDraft: false
          prerelease: false
          # Per-arch target so each matrix job emits one platform entry that
          # tauri-action merges into the shared latest.json.
          args: --target ${{ matrix.target }}
